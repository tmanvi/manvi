<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            font-size:large;
            flex-direction: column;
            flex-wrap:wrap;
            background-color: #ada9a9;
            gap:20px;
            padding:10px;
            width:50%;
            align-items: center;
            margin-left: 25%;
        }
        .card{
            background-color: rgb(180, 192, 244);
            display: flex;
            justify-content: center;
            width:200px;
            padding:10px;
            border-radius: 10px;
            flex-direction: column;
            flex-wrap:wrap;
        }
        div.card:hover{
            background-color: beige;
            padding:14px 24px;
        }
        .btn:hover{
            color: rgb(235, 234, 236);
            padding:3px;
            background-color: #0c1110;
        }
       

    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <p class="title">Title: Antique Gold Jewellery</p>
            <p class="rating">★★★★★</p>
        </div>
        
        <div class="card">
            <p class="title">Title: Stunning Jhumkas</p>
            <p class="rating">★☆☆☆☆</p>
        </div>
        <div class="card">
            <button class="btn">Click here</button>
        </div>
    </div>
    <script>
        const carddiv=document.querySelectorAll('.card');
        const button1=document.querySelector('.btn');
        button1.addEventListener('click',()=>{
            carddiv.forEach((card)=>{
                card.style.background='#b78ba5'
        })
    })
       //console.log('----->',carddiv);
    </script>
</body>
</html>
