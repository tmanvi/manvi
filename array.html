<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background-color: #4fb0b3;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 250px;
    background-color: rgb(185, 210, 251);
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background-color: burlywood;
}

.card h2 {
    margin-bottom: 10px;
    color: #333;
}

.card p {
    margin-bottom: 10px;
    color: #666;
}

.price {
    font-weight: bold;
    color: green;
    font-size: 18px;
}
    </style>
</head>
<body>
    <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards Using Map</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Product Cards</h1>

    <div id="cardContainer" class="container">
        
    </div>

    
    <script>
        const products = [
  {
    name: "Laptop",
    description: "High-performance laptop for work and gaming.",
    price: "₹50,000",
  },
  {
    name: "Smartphone",
    description: "Latest Android smartphone with amazing camera.",
    price: "₹25,000",
  },
  {
    name: "Headphones",
    description: "Wireless headphones with noise cancellation.",
    price: "₹3,000",
  },
  {
    name: "Smart Watch",
    description: "Track your health and notifications.",
    price: "₹5,000",
  },

  {
    name: "Panasonic ac",
    description: "Track your health and notifications.",
    price: "₹5,000",
  },
];

const cardContainer = document.getElementById("cardContainer");

const name='satyawan'
cardContainer.innerHTML =  
products.map(
    (product) => 
      `
        <div class="card">
            <h2>${product.name}</h2>
            <p>${product.description}</p>
            <p class="price">${product.price}</p>
        </div>
    `
  );
    </script>
</body>
</html>
